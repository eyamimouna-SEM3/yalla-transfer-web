databases:
  - name: yalla-transfer-db
    plan: basic-256mb
    databaseName: yalla_transfer

services:
  - type: web
    name: yalla-transfer-backend
    runtime: node
    plan: starter
    branch: main
    buildCommand: cd backend && npm install && npm run build
    preDeployCommand: cd backend && npx prisma db push
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yalla-transfer-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
